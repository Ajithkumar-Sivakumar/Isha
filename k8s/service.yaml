apiVersion: v1
kind: Service
metadata:
  name: sample-app-svc
  namespace: sample-app
spec:
  type: ClusterIP
  selector:
    app: sample-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080

# ClusterIP service exposes the pods inside the cluster. For external access,
# use an Ingress (below) or change type to LoadBalancer when appropriate.
