name: PY App Workflow Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  IMAGE_URI: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}

jobs:
  runner-test:
    name: Verify self-hosted runner
    runs-on:
      - self-hosted
      - Linux
      - X64
      - aws

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Display runner information
        run: |
          echo "========== Runner Information =========="
          echo "Hostname: $(hostname)"
          echo "User: $(whoami)"
          echo "Current Directory: $(pwd)"
          uname -a

      - name: Check required tools
        run: |
          echo "========== Tooling =========="
          git --version
          docker --version
          aws --version
          python3 --version

      - name: Install Python and pip
        run: |
          sudo apt update
          sudo apt install -y python3 python3-pip
      
      - name: Install application dependencies
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

  code-linting:
    name: Code linting
    needs: runner-test
    runs-on:
      - self-hosted
      - Linux
      - X64
      - aws

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install lint tools
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt pylint

      - name: Run pylint
        run: |
          pylint app.py

  unit-tests:
    name: Unit tests
    needs: runner-test
    runs-on:
      - self-hosted
      - Linux
      - X64
      - aws

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install test tools
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt pytest pytest-cov

      - name: Run unit tests with coverage
        run: |
          pytest -q --cov=app --cov-report=term-missing --cov-report=xml --cov-report=html --cov-fail-under=70

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/

  coverage-report:
    name: Coverage report
    needs: unit-tests
    runs-on:
      - self-hosted
      - Linux
      - X64
      - aws

    steps:
      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage-artifacts

      - name: Show coverage summary
        run: |
          echo "Coverage artifact contents:"
          find coverage-artifacts -maxdepth 2 -type f | sort

  build-and-push:
    name: Build and push Docker image
    needs:
      - code-linting
      - unit-tests
      - coverage-report
    runs-on:
      - self-hosted
      - Linux
      - X64
      - aws

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/GitHubActionsOIDCRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        run: |
          aws sts get-caller-identity

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" \
            || aws ecr create-repository --repository-name "$ECR_REPOSITORY"

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

      - name: Build Docker image
        run: |
          IMAGE_SHA=${GITHUB_SHA::8}
          docker build -t "${IMAGE_URI}:latest" -t "${IMAGE_URI}:${IMAGE_SHA}" .

      - name: Smoke test container
        run: |
          IMAGE_SHA=${GITHUB_SHA::8}
          docker run -d --name py-app-test -p 8080:8080 "${IMAGE_URI}:${IMAGE_SHA}"
          for i in {1..20}; do
            if curl -sf http://127.0.0.1:8080/health; then
              break
            fi
            sleep 2
          done
          docker rm -f py-app-test

      - name: Push Docker image
        run: |
          IMAGE_SHA=${GITHUB_SHA::8}
          docker push "${IMAGE_URI}:latest"
          docker push "${IMAGE_URI}:${IMAGE_SHA}"

  trivy-scan:
    name: Trivy image scan
    needs: build-and-push
    runs-on:
      - self-hosted
      - Linux
      - X64
      - aws

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh

      - name: Scan container image
        run: |
          IMAGE_SHA=${GITHUB_SHA::8}
          trivy image --exit-code 1 --severity HIGH,CRITICAL "${IMAGE_URI}:${IMAGE_SHA}" || true

  sbom-generation:
    name: Generate SBOM
    needs: build-and-push
    runs-on:
      - self-hosted
      - Linux
      - X64
      - aws

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sudo sh

      - name: Generate SBOM
        run: |
          IMAGE_SHA=${GITHUB_SHA::8}
          syft "${IMAGE_URI}:${IMAGE_SHA}" -o json > sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-report
          path: sbom.json

  sign-docker-image:
    name: Sign Docker image
    needs: build-and-push
    runs-on:
      - self-hosted
      - Linux
      - X64
      - aws

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Cosign
        run: |
          curl -sSfL https://raw.githubusercontent.com/sigstore/cosign/main/install.sh | sudo sh

      - name: Sign image
        run: |
          IMAGE_SHA=${GITHUB_SHA::8}
          echo "Signing ${IMAGE_URI}:${IMAGE_SHA}"
          cosign sign --yes --key cosign.key "${IMAGE_URI}:${IMAGE_SHA}" || true

