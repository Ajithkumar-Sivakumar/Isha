name: Docker Compose CI

on:
  push:
    branches:
      - feature/docker-compose

jobs:
  verify-compose:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Docker Installation
        run: docker --version

      - name: Verify Docker Compose Installation
        run: docker compose version

      - name: Validate Compose File
        run: docker compose -f docker-compose/docker-compose.yaml config

      - name: Pull Images
        run: docker compose -f docker-compose/docker-compose.yaml pull

      - name: Start Containers
        run: docker compose -f docker-compose/docker-compose.yaml up -d

      - name: Wait for Containers
        run: sleep 20

      - name: Verify Running Containers
        run: docker ps

      - name: Verify Nginx Service
        run: |
          curl -I http://localhost:8080

      - name: Verify MySQL Container
        run: |
          docker exec mysql-db mysqladmin ping -uroot -proot123

      - name: Display Logs
        if: always()
        run: docker compose -f docker-compose/docker-compose.yaml logs

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose/docker-compose.yaml down -v
