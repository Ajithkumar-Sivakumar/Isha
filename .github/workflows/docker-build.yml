name: Build and Push Docker Image to ECR

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

jobs:
  runner-test:
    name: Verify Self-Hosted Runner
    runs-on:
      - self-hosted
      - Linux
      - X64
      - aws

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Display Runner Information
        run: |
          echo "========== Runner Information =========="
          echo "Hostname: $(hostname)"
          echo "User: $(whoami)"
          echo "Current Directory: $(pwd)"
          echo "Operating System:"
          uname -a

      - name: Check Installed Tools
        run: |
          echo "========== Installed Tools =========="
          git --version
          docker --version
          aws --version
          python3 --version || true

      - name: Check Docker Status
        run: |
          echo "========== Docker =========="
          docker ps

      - name: Check Disk Usage
        run: |
          echo "========== Disk Usage =========="
          df -h

      - name: Check Memory
        run: |
          echo "========== Memory =========="
          free -h

      - name: Success Message
        run: |
          echo "✅ Self-hosted runner is working successfully!"

  build-and-push:
    name: Build and Push Docker Image
    needs: runner-test

    runs-on:
      - self-hosted
      - Linux
      - X64
      - aws

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/GitHubActionsOIDCRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS Identity
        run: |
          aws sts get-caller-identity

      - name: Ensure ECR Repository Exists
        run: |
          aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" \
          || aws ecr create-repository --repository-name "$ECR_REPOSITORY"

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION \
          | docker login \
          --username AWS \
          --password-stdin \
          ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com

      - name: Build Docker Image
        run: |
          IMAGE_URI=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}
          IMAGE_SHA=${GITHUB_SHA::8}

          docker build \
            -t ${IMAGE_URI}:latest \
            -t ${IMAGE_URI}:${IMAGE_SHA} .

      - name: List Docker Images
        run: |
          docker images

      - name: Push Docker Images
        run: |
          IMAGE_URI=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}
          IMAGE_SHA=${GITHUB_SHA::8}

          docker push ${IMAGE_URI}:latest
          docker push ${IMAGE_URI}:${IMAGE_SHA}

      - name: Success
        run: |
          echo "🎉 Docker image successfully pushed to Amazon ECR!"